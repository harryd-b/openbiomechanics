<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Skeleton Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a18;
        }
        #skeleton-container {
            width: 100%;
            height: 100%;
        }
        #mode-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #00d4ff;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
        }
        #mode-indicator:hover {
            background: rgba(0,100,150,0.5);
        }
    </style>
</head>
<body>
    <div id="skeleton-container"></div>
    <div id="mode-indicator">Mode: Polygon</div>

    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // Render modes
        const RENDER_MODES = ['polygon', 'cylinder'];
        let currentMode = 'polygon';

        // H36M skeleton connections with thickness multipliers
        const SKELETON_CONNECTIONS = [
            { joints: [0, 7], thick: 2.0, type: 'core' },    // Hip to spine
            { joints: [7, 8], thick: 1.8, type: 'core' },    // Spine
            { joints: [8, 9], thick: 1.4, type: 'core' },    // Neck
            { joints: [9, 10], thick: 1.0, type: 'head' },   // Head
            { joints: [8, 11], thick: 1.5, type: 'arm' },    // Left shoulder
            { joints: [11, 12], thick: 1.2, type: 'arm' },   // Left upper arm
            { joints: [12, 13], thick: 0.9, type: 'arm' },   // Left forearm
            { joints: [8, 14], thick: 1.5, type: 'arm' },    // Right shoulder
            { joints: [14, 15], thick: 1.2, type: 'arm' },   // Right upper arm
            { joints: [15, 16], thick: 0.9, type: 'arm' },   // Right forearm
            { joints: [0, 4], thick: 1.7, type: 'leg' },     // Left hip
            { joints: [4, 5], thick: 1.5, type: 'leg' },     // Left thigh
            { joints: [5, 6], thick: 1.1, type: 'leg' },     // Left shin
            { joints: [0, 1], thick: 1.7, type: 'leg' },     // Right hip
            { joints: [1, 2], thick: 1.5, type: 'leg' },     // Right thigh
            { joints: [2, 3], thick: 1.1, type: 'leg' },     // Right shin
        ];

        // Joint sizes for cylinder mode
        const JOINT_SIZES = {
            0: 0.07, 1: 0.05, 2: 0.05, 3: 0.04,
            4: 0.05, 5: 0.05, 6: 0.04,
            7: 0.06, 8: 0.06, 9: 0.05, 10: 0.14,
            11: 0.055, 12: 0.05, 13: 0.04,
            14: 0.055, 15: 0.05, 16: 0.04,
        };

        // Polygon mode joint sizes (octahedrons)
        const POLY_JOINT_SIZES = {
            0: 0.09, 1: 0.06, 2: 0.06, 3: 0.05,
            4: 0.06, 5: 0.06, 6: 0.05,
            7: 0.07, 8: 0.07, 9: 0.06, 10: 0.12,
            11: 0.06, 12: 0.055, 13: 0.045,
            14: 0.06, 15: 0.055, 16: 0.045,
        };

        // Color palette - red/orange for polygon mode (like UPLIFT), cyan for cylinder
        const COLORS = {
            polygon: {
                core: { main: 0xcc3333, emissive: 0x441111 },
                arm: { main: 0xdd4444, emissive: 0x331111 },
                leg: { main: 0xbb2222, emissive: 0x330808 },
                head: { main: 0xee5555, emissive: 0x441515 },
                joint: { main: 0xff4444, emissive: 0x551111 },
            },
            cylinder: {
                core: { main: 0x00d4ff, emissive: 0x004466 },
                arm: { main: 0x00aadd, emissive: 0x003344 },
                leg: { main: 0x0088bb, emissive: 0x002233 },
                head: { main: 0x00eeff, emissive: 0x005566 },
                joint: { main: 0x00ffff, emissive: 0x006666 },
            }
        };

        let scene, camera, renderer, controls;
        let skeletonGroup = null;  // Container for all skeleton meshes
        let poses = [];
        let currentFrame = 0;
        let poseHistory = [];
        let jointPositions = [];  // Store computed joint positions

        function init() {
            const container = document.getElementById('skeleton-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 5, 15);

            const aspect = container.clientWidth / container.clientHeight;
            camera = new THREE.PerspectiveCamera(50, aspect, 0.1, 100);
            camera.position.set(2.5, 1.8, 2.5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Lighting
            const ambient = new THREE.AmbientLight(0x404060, 0.6);
            scene.add(ambient);

            const directional = new THREE.DirectionalLight(0xffffff, 1.0);
            directional.position.set(5, 10, 5);
            directional.castShadow = true;
            directional.shadow.mapSize.width = 2048;
            directional.shadow.mapSize.height = 2048;
            scene.add(directional);

            const rimLight = new THREE.DirectionalLight(0xff6666, 0.3);
            rimLight.position.set(-3, 5, -5);
            scene.add(rimLight);

            const fillLight = new THREE.PointLight(0x6666aa, 0.4);
            fillLight.position.set(0, 0.5, 2);
            scene.add(fillLight);

            createFloor();

            // Shadow plane
            const shadowGeo = new THREE.PlaneGeometry(10, 10);
            const shadowMat = new THREE.ShadowMaterial({ opacity: 0.5 });
            const shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
            shadowPlane.rotation.x = -Math.PI / 2;
            shadowPlane.position.y = 0.001;
            shadowPlane.receiveShadow = true;
            scene.add(shadowPlane);

            // Initialize joint positions array
            for (let i = 0; i < 17; i++) {
                jointPositions.push(new THREE.Vector3());
            }

            // Create skeleton group
            skeletonGroup = new THREE.Group();
            scene.add(skeletonGroup);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 0.9, 0);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 1;
            controls.maxDistance = 10;
            controls.update();

            // Mode toggle
            document.getElementById('mode-indicator').addEventListener('click', toggleMode);

            window.addEventListener('resize', onResize);
            window.addEventListener('message', handleMessage);

            animate();
        }

        function toggleMode() {
            const idx = RENDER_MODES.indexOf(currentMode);
            currentMode = RENDER_MODES[(idx + 1) % RENDER_MODES.length];
            document.getElementById('mode-indicator').textContent = 'Mode: ' + currentMode.charAt(0).toUpperCase() + currentMode.slice(1);

            // Update colors based on mode
            if (currentMode === 'polygon') {
                scene.background = new THREE.Color(0x1a1a2e);
                scene.fog = new THREE.Fog(0x1a1a2e, 5, 15);
            } else {
                scene.background = new THREE.Color(0x0a0a18);
                scene.fog = new THREE.Fog(0x0a0a18, 4, 12);
            }

            // Re-render current frame
            if (poses.length > 0 && currentFrame < poses.length) {
                updateSkeleton(poses[currentFrame]);
            }
        }

        function createFloor() {
            const gridSize = 6;
            const gridDivisions = 30;

            const gridHelper = new THREE.GridHelper(gridSize, gridDivisions, 0x333355, 0x222233);
            gridHelper.position.y = 0;
            scene.add(gridHelper);

            const material = gridHelper.material;
            if (material) {
                material.transparent = true;
                material.opacity = 0.5;
            }

            const centerGeo = new THREE.RingGeometry(0.08, 0.1, 32);
            const centerMat = new THREE.MeshBasicMaterial({
                color: 0x666688,
                transparent: true,
                opacity: 0.4,
                side: THREE.DoubleSide
            });
            const centerRing = new THREE.Mesh(centerGeo, centerMat);
            centerRing.rotation.x = -Math.PI / 2;
            centerRing.position.y = 0.002;
            scene.add(centerRing);
        }

        function clearSkeleton() {
            while (skeletonGroup.children.length > 0) {
                const child = skeletonGroup.children[0];
                if (child.geometry) child.geometry.dispose();
                if (child.material) {
                    if (Array.isArray(child.material)) {
                        child.material.forEach(m => m.dispose());
                    } else {
                        child.material.dispose();
                    }
                }
                skeletonGroup.remove(child);
            }
        }

        function createPolygonJoint(position, size, colorType) {
            const colors = COLORS.polygon;
            const color = colors[colorType] || colors.joint;

            // Octahedron for diamond/crystal look
            const geo = new THREE.OctahedronGeometry(size, 0);
            const mat = new THREE.MeshStandardMaterial({
                color: color.main,
                emissive: color.emissive,
                roughness: 0.4,
                metalness: 0.3,
                flatShading: true
            });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(position);
            mesh.castShadow = true;

            // Random rotation for variety
            mesh.rotation.x = Math.random() * 0.3;
            mesh.rotation.z = Math.random() * 0.3;

            return mesh;
        }

        function createPolygonBone(startPos, endPos, thickness, colorType) {
            const colors = COLORS.polygon;
            const color = colors[colorType] || colors.core;

            const direction = new THREE.Vector3().subVectors(endPos, startPos);
            const length = direction.length();
            if (length < 0.001) return null;

            const midPoint = new THREE.Vector3().addVectors(startPos, endPos).multiplyScalar(0.5);

            // Create a wedge/prism shape for the bone
            const width = 0.025 * thickness;
            const depth = 0.015 * thickness;

            // Custom geometry - flat polygon strip with triangular cross-section
            const geo = new THREE.BufferGeometry();

            // Create vertices for a tapered prism
            const halfLen = 0.5;
            const taperStart = 0.7;  // Start wider
            const taperEnd = 0.5;    // End narrower

            const vertices = new Float32Array([
                // Front face (2 triangles)
                -width * taperStart, -halfLen, depth * taperStart,
                width * taperStart, -halfLen, depth * taperStart,
                width * taperEnd, halfLen, depth * taperEnd,

                -width * taperStart, -halfLen, depth * taperStart,
                width * taperEnd, halfLen, depth * taperEnd,
                -width * taperEnd, halfLen, depth * taperEnd,

                // Back face
                width * taperStart, -halfLen, -depth * taperStart,
                -width * taperStart, -halfLen, -depth * taperStart,
                -width * taperEnd, halfLen, -depth * taperEnd,

                width * taperStart, -halfLen, -depth * taperStart,
                -width * taperEnd, halfLen, -depth * taperEnd,
                width * taperEnd, halfLen, -depth * taperEnd,

                // Left face
                -width * taperStart, -halfLen, -depth * taperStart,
                -width * taperStart, -halfLen, depth * taperStart,
                -width * taperEnd, halfLen, depth * taperEnd,

                -width * taperStart, -halfLen, -depth * taperStart,
                -width * taperEnd, halfLen, depth * taperEnd,
                -width * taperEnd, halfLen, -depth * taperEnd,

                // Right face
                width * taperStart, -halfLen, depth * taperStart,
                width * taperStart, -halfLen, -depth * taperStart,
                width * taperEnd, halfLen, -depth * taperEnd,

                width * taperStart, -halfLen, depth * taperStart,
                width * taperEnd, halfLen, -depth * taperEnd,
                width * taperEnd, halfLen, depth * taperEnd,

                // Bottom cap
                -width * taperStart, -halfLen, -depth * taperStart,
                width * taperStart, -halfLen, -depth * taperStart,
                width * taperStart, -halfLen, depth * taperStart,

                -width * taperStart, -halfLen, -depth * taperStart,
                width * taperStart, -halfLen, depth * taperStart,
                -width * taperStart, -halfLen, depth * taperStart,

                // Top cap
                -width * taperEnd, halfLen, depth * taperEnd,
                width * taperEnd, halfLen, depth * taperEnd,
                width * taperEnd, halfLen, -depth * taperEnd,

                -width * taperEnd, halfLen, depth * taperEnd,
                width * taperEnd, halfLen, -depth * taperEnd,
                -width * taperEnd, halfLen, -depth * taperEnd,
            ]);

            geo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
            geo.computeVertexNormals();

            const mat = new THREE.MeshStandardMaterial({
                color: color.main,
                emissive: color.emissive,
                roughness: 0.5,
                metalness: 0.2,
                flatShading: true,
                side: THREE.DoubleSide
            });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(midPoint);
            mesh.scale.y = length;
            mesh.castShadow = true;

            // Orient bone along direction
            const axis = new THREE.Vector3(0, 1, 0);
            const quaternion = new THREE.Quaternion();
            quaternion.setFromUnitVectors(axis, direction.normalize());
            mesh.quaternion.copy(quaternion);

            return mesh;
        }

        function createCylinderJoint(position, size, colorType) {
            const colors = COLORS.cylinder;
            const color = colors[colorType] || colors.joint;

            const geo = new THREE.SphereGeometry(size, 16, 12);
            const mat = new THREE.MeshStandardMaterial({
                color: color.main,
                emissive: color.emissive,
                roughness: 0.2,
                metalness: 0.3,
                transparent: true,
                opacity: 0.95
            });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(position);
            mesh.castShadow = true;

            return mesh;
        }

        function createCylinderBone(startPos, endPos, thickness, colorType) {
            const colors = COLORS.cylinder;
            const color = colors[colorType] || colors.core;

            const direction = new THREE.Vector3().subVectors(endPos, startPos);
            const length = direction.length();
            if (length < 0.001) return null;

            const midPoint = new THREE.Vector3().addVectors(startPos, endPos).multiplyScalar(0.5);

            const baseRadius = 0.035;
            const topRadius = baseRadius * thickness;
            const bottomRadius = baseRadius * thickness * 0.85;

            const geo = new THREE.CylinderGeometry(topRadius, bottomRadius, 1, 12);
            const mat = new THREE.MeshStandardMaterial({
                color: color.main,
                emissive: color.emissive,
                roughness: 0.25,
                metalness: 0.2,
                transparent: true,
                opacity: 0.9
            });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(midPoint);
            mesh.scale.y = length;
            mesh.castShadow = true;

            const axis = new THREE.Vector3(0, 1, 0);
            const quaternion = new THREE.Quaternion();
            quaternion.setFromUnitVectors(axis, direction.normalize());
            mesh.quaternion.copy(quaternion);

            return mesh;
        }

        function createTorsoPolygon() {
            // Create polygonal torso connecting shoulders and hips
            const leftShoulder = jointPositions[11];
            const rightShoulder = jointPositions[14];
            const leftHip = jointPositions[4];
            const rightHip = jointPositions[1];
            const spine = jointPositions[8];
            const pelvis = jointPositions[0];

            const colors = COLORS[currentMode];
            const color = colors.core;

            // Front and back depth offset
            const frontOffset = new THREE.Vector3(0, 0, 0.03);
            const backOffset = new THREE.Vector3(0, 0, -0.03);

            const vertices = new Float32Array([
                // Front torso - upper triangle
                leftShoulder.x + frontOffset.x, leftShoulder.y + frontOffset.y, leftShoulder.z + frontOffset.z,
                rightShoulder.x + frontOffset.x, rightShoulder.y + frontOffset.y, rightShoulder.z + frontOffset.z,
                spine.x + frontOffset.x, spine.y + frontOffset.y, spine.z + frontOffset.z,

                // Front torso - middle quad (2 triangles)
                leftShoulder.x + frontOffset.x, leftShoulder.y + frontOffset.y, leftShoulder.z + frontOffset.z,
                spine.x + frontOffset.x, spine.y + frontOffset.y, spine.z + frontOffset.z,
                leftHip.x + frontOffset.x, leftHip.y + frontOffset.y, leftHip.z + frontOffset.z,

                rightShoulder.x + frontOffset.x, rightShoulder.y + frontOffset.y, rightShoulder.z + frontOffset.z,
                rightHip.x + frontOffset.x, rightHip.y + frontOffset.y, rightHip.z + frontOffset.z,
                spine.x + frontOffset.x, spine.y + frontOffset.y, spine.z + frontOffset.z,

                // Front torso - lower triangle
                leftHip.x + frontOffset.x, leftHip.y + frontOffset.y, leftHip.z + frontOffset.z,
                spine.x + frontOffset.x, spine.y + frontOffset.y, spine.z + frontOffset.z,
                rightHip.x + frontOffset.x, rightHip.y + frontOffset.y, rightHip.z + frontOffset.z,

                // Lower pelvis triangle
                leftHip.x + frontOffset.x, leftHip.y + frontOffset.y, leftHip.z + frontOffset.z,
                rightHip.x + frontOffset.x, rightHip.y + frontOffset.y, rightHip.z + frontOffset.z,
                pelvis.x + frontOffset.x, pelvis.y + frontOffset.y, pelvis.z + frontOffset.z,

                // Back torso (mirrored)
                rightShoulder.x + backOffset.x, rightShoulder.y + backOffset.y, rightShoulder.z + backOffset.z,
                leftShoulder.x + backOffset.x, leftShoulder.y + backOffset.y, leftShoulder.z + backOffset.z,
                spine.x + backOffset.x, spine.y + backOffset.y, spine.z + backOffset.z,

                spine.x + backOffset.x, spine.y + backOffset.y, spine.z + backOffset.z,
                leftShoulder.x + backOffset.x, leftShoulder.y + backOffset.y, leftShoulder.z + backOffset.z,
                leftHip.x + backOffset.x, leftHip.y + backOffset.y, leftHip.z + backOffset.z,

                spine.x + backOffset.x, spine.y + backOffset.y, spine.z + backOffset.z,
                rightHip.x + backOffset.x, rightHip.y + backOffset.y, rightHip.z + backOffset.z,
                rightShoulder.x + backOffset.x, rightShoulder.y + backOffset.y, rightShoulder.z + backOffset.z,

                rightHip.x + backOffset.x, rightHip.y + backOffset.y, rightHip.z + backOffset.z,
                spine.x + backOffset.x, spine.y + backOffset.y, spine.z + backOffset.z,
                leftHip.x + backOffset.x, leftHip.y + backOffset.y, leftHip.z + backOffset.z,

                rightHip.x + backOffset.x, rightHip.y + backOffset.y, rightHip.z + backOffset.z,
                leftHip.x + backOffset.x, leftHip.y + backOffset.y, leftHip.z + backOffset.z,
                pelvis.x + backOffset.x, pelvis.y + backOffset.y, pelvis.z + backOffset.z,
            ]);

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
            geo.computeVertexNormals();

            const mat = new THREE.MeshStandardMaterial({
                color: color.main,
                emissive: color.emissive,
                roughness: 0.5,
                metalness: 0.2,
                flatShading: true,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.7
            });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;

            return mesh;
        }

        function updateSkeleton(pose, updateHistory = true) {
            if (!pose || pose.length < 17) return;

            // Update pose history
            if (updateHistory) {
                poseHistory.unshift(JSON.parse(JSON.stringify(pose)));
                if (poseHistory.length > 4) poseHistory.pop();
            }

            // Clear existing skeleton
            clearSkeleton();

            // Compute joint positions
            const validJoints = [];
            for (let i = 0; i < Math.min(17, pose.length); i++) {
                const [x, y, z] = pose[i];
                if (Math.abs(x) > 5 || Math.abs(y) > 5 || Math.abs(z) > 5) {
                    validJoints[i] = false;
                    continue;
                }
                jointPositions[i].set(x, z, -y);
                validJoints[i] = true;
            }

            // Create bones first (so joints render on top)
            for (const conn of SKELETON_CONNECTIONS) {
                const [start, end] = conn.joints;
                if (!validJoints[start] || !validJoints[end]) continue;

                let bone;
                if (currentMode === 'polygon') {
                    bone = createPolygonBone(jointPositions[start], jointPositions[end], conn.thick, conn.type);
                } else {
                    bone = createCylinderBone(jointPositions[start], jointPositions[end], conn.thick, conn.type);
                }
                if (bone) skeletonGroup.add(bone);
            }

            // Create torso polygon
            if (validJoints[0] && validJoints[1] && validJoints[4] && validJoints[8] && validJoints[11] && validJoints[14]) {
                const torso = createTorsoPolygon();
                skeletonGroup.add(torso);
            }

            // Create joints
            for (let i = 0; i < 17; i++) {
                if (!validJoints[i]) continue;

                // Determine color type based on joint
                let colorType = 'joint';
                if (i === 10) colorType = 'head';
                else if (i >= 11 && i <= 16) colorType = 'arm';
                else if (i >= 1 && i <= 6) colorType = 'leg';
                else if (i === 0 || i === 7 || i === 8 || i === 9) colorType = 'core';

                let joint;
                if (currentMode === 'polygon') {
                    const size = POLY_JOINT_SIZES[i] || 0.05;
                    joint = createPolygonJoint(jointPositions[i], size, colorType);
                } else {
                    const size = JOINT_SIZES[i] || 0.035;
                    joint = createCylinderJoint(jointPositions[i], size, colorType);
                }
                skeletonGroup.add(joint);
            }

            // Add motion trail (ghost frames) for polygon mode
            if (currentMode === 'polygon') {
                createGhostFrames(validJoints);
            }
        }

        function createGhostFrames(currentValidJoints) {
            // Create 2 ghost frames
            for (let g = 0; g < 2; g++) {
                const historyIdx = g + 1;
                if (historyIdx >= poseHistory.length) continue;

                const historicalPose = poseHistory[historyIdx];
                const opacity = 0.2 - g * 0.08;

                const ghostPositions = [];
                const ghostValid = [];

                for (let i = 0; i < Math.min(17, historicalPose.length); i++) {
                    const [x, y, z] = historicalPose[i];
                    if (Math.abs(x) > 5 || Math.abs(y) > 5 || Math.abs(z) > 5) {
                        ghostValid[i] = false;
                        ghostPositions[i] = new THREE.Vector3();
                        continue;
                    }
                    ghostPositions[i] = new THREE.Vector3(x, z, -y);
                    ghostValid[i] = true;
                }

                // Ghost bones
                for (const conn of SKELETON_CONNECTIONS) {
                    const [start, end] = conn.joints;
                    if (!ghostValid[start] || !ghostValid[end]) continue;

                    const direction = new THREE.Vector3().subVectors(ghostPositions[end], ghostPositions[start]);
                    const length = direction.length();
                    if (length < 0.001) continue;

                    const midPoint = new THREE.Vector3().addVectors(ghostPositions[start], ghostPositions[end]).multiplyScalar(0.5);
                    const width = 0.012 * conn.thick;

                    const geo = new THREE.CylinderGeometry(width, width * 0.8, 1, 4);
                    const mat = new THREE.MeshBasicMaterial({
                        color: 0xaa4444,
                        transparent: true,
                        opacity: opacity
                    });

                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.copy(midPoint);
                    mesh.scale.y = length;

                    const axis = new THREE.Vector3(0, 1, 0);
                    const quaternion = new THREE.Quaternion();
                    quaternion.setFromUnitVectors(axis, direction.normalize());
                    mesh.quaternion.copy(quaternion);

                    skeletonGroup.add(mesh);
                }

                // Ghost joints
                for (let i = 0; i < 17; i++) {
                    if (!ghostValid[i]) continue;

                    const size = (POLY_JOINT_SIZES[i] || 0.05) * 0.6;
                    const geo = new THREE.OctahedronGeometry(size, 0);
                    const mat = new THREE.MeshBasicMaterial({
                        color: 0xcc5555,
                        transparent: true,
                        opacity: opacity
                    });

                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.copy(ghostPositions[i]);
                    skeletonGroup.add(mesh);
                }
            }
        }

        function handleMessage(event) {
            const data = event.data;
            if (!data) return;

            console.log('Skeleton viewer received message:', data.type);

            if (data.type === 'setPoses') {
                console.log('Setting poses, count:', data.poses ? data.poses.length : 0);
                poses = data.poses || [];
                currentFrame = 0;
                if (poses.length > 0) {
                    updateSkeleton(poses[0]);
                }
            } else if (data.type === 'setFrame') {
                currentFrame = data.frame || 0;
                if (currentFrame < poses.length) {
                    updateSkeleton(poses[currentFrame]);
                }
            } else if (data.type === 'setMode') {
                if (RENDER_MODES.includes(data.mode)) {
                    currentMode = data.mode;
                    document.getElementById('mode-indicator').textContent = 'Mode: ' + currentMode.charAt(0).toUpperCase() + currentMode.slice(1);
                    if (poses.length > 0 && currentFrame < poses.length) {
                        updateSkeleton(poses[currentFrame]);
                    }
                }
            }
        }

        function onResize() {
            const container = document.getElementById('skeleton-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Start
        init();

        // Notify parent we're ready and request poses
        window.addEventListener('load', function() {
            console.log('Skeleton viewer ready, notifying parent');

            function tryGetPoses() {
                if (window.parent.skeletonPoses && window.parent.skeletonPoses.length > 0) {
                    console.log('Found poses in parent:', window.parent.skeletonPoses.length, 'frames');
                    poses = window.parent.skeletonPoses;
                    currentFrame = window.parent.skeletonFrame || 0;
                    updateSkeleton(poses[currentFrame]);
                    return true;
                }
                return false;
            }

            if (!tryGetPoses()) {
                window.parent.postMessage({type: 'skeletonReady'}, '*');

                var retries = 0;
                var retryInterval = setInterval(function() {
                    if (tryGetPoses() || retries > 50) {
                        clearInterval(retryInterval);
                        return;
                    }
                    retries++;
                    if (retries % 5 === 0) {
                        window.parent.postMessage({type: 'requestPoses'}, '*');
                    }
                }, 100);
            }

            setInterval(function() {
                if (window.parent.skeletonPoses && window.parent.skeletonPoses.length > 0) {
                    var parentFrame = window.parent.skeletonFrame || 0;
                    if (parentFrame !== currentFrame || poses.length === 0) {
                        poses = window.parent.skeletonPoses;
                        currentFrame = parentFrame;
                        updateSkeleton(poses[currentFrame]);
                    }
                }
            }, 50);
        });
    </script>
</body>
</html>
